[build]
  publish = "dist"

# Never cache index.html — ensures browsers always get the latest version
# with correct asset filenames after each deployment.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Cache hashed assets forever — content hash in filename guarantees
# new content always gets a new URL.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
